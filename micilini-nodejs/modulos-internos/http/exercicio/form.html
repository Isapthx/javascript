<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Dados</title>
</head>
<body>
    <h1>Enviar Dados</h1>

    <p>Testando Envio de Dados por POST e GET com formulário:</p>

    <h2>Formulário POST</h2>
    
    <form action="http://localhost:3000/post" method="post">
        <label for="nome">Nome: </label>
        <input type="text" name="nome" id="nome" required>
        <br><br>
        <label for="sobrenome">Sobrenome: </label>
        <input type="text" name="sobrenome" id="sobrenome" required>
        <br><br>
        <button type="submit">Enviar</button>
    </form>

    <h2>Formulário GET</h2>

    <form action="http://localhost:3000/get" method="get">
        <label for="nome">Nome: </label>
        <input type="text" name="nome" id="nome" required>
        <br><br>
        <label for="Idade">Idade: </label>
        <input type="text" name="idade" id="idade" required>
        <br><br>
        <button type="submit">Enviar</button>
    </form>

</body>
</html>
